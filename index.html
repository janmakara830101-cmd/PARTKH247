<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PARTKH247</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e6edf3;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      max-width: 400px;
      width: 90%;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #21262d;
      border: 2px solid #30363d;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #e6edf3;
    }

    .bio {
      font-size: 15px;
      color: #8b949e;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: block;
      padding: 14px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: opacity 0.15s, transform 0.15s;
      border: 1px solid #30363d;
    }

    .link-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .github {
      background: #21262d;
      color: #e6edf3;
      border-color: #30363d;
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #30363d;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">P</div>
    <h1>PARTKH247</h1>
    <p class="bio">Building things one commit at a time.</p>
    <div class="links">
      <a class="link-btn github" href="https://github.com/janmakara830101-cmd" target="_blank" rel="noopener">
        GitHub
      </a>
    </div>
    <p class="footer">Made with HTML &amp; CSS</p>
  </div>
</body>
</html>
